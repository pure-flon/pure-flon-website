<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 스무고개 | 내가 생각한 걸 맞춰볼게</title>
<meta name="description" content="AI가 20번의 질문으로 당신이 생각한 것을 맞춥니다. 지금 도전하세요!">
<meta property="og:title" content="AI 스무고개 - 내가 생각한 걸 맞춰볼게">
<meta property="og:description" content="AI가 20번의 질문으로 당신이 생각한 것을 맞춥니다">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.container{max-width:480px;width:100%;padding:20px;margin:0 auto}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;letter-spacing:-0.02em;color:#fff}
.subtitle{text-align:center;color:#888;font-size:0.9rem;margin-bottom:32px}
.card{background:#161616;border:1px solid #222;border-radius:16px;padding:28px;margin-bottom:16px}
.question-num{font-size:0.75rem;color:#666;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px}
.question-text{font-size:1.15rem;line-height:1.5;color:#fff;margin-bottom:24px}
.btn-row{display:flex;gap:10px}
.btn{flex:1;padding:14px;border:1px solid #333;border-radius:12px;background:#1a1a1a;color:#fff;font-size:1rem;cursor:pointer;transition:all 0.15s;text-align:center;font-weight:500}
.btn:hover{background:#252525;border-color:#444}
.btn:active{transform:scale(0.97)}
.btn-yes{border-color:#2d5a2d;color:#6bdf6b}.btn-yes:hover{background:#1a3a1a;border-color:#3d7a3d}
.btn-no{border-color:#5a2d2d;color:#df6b6b}.btn-no:hover{background:#3a1a1a;border-color:#7a3d3d}
.btn-maybe{border-color:#5a5a2d;color:#dfdf6b}.btn-maybe:hover{background:#3a3a1a}
.btn-start{background:#1a1aff;border-color:#3333ff;font-size:1.1rem;padding:16px;border-radius:14px;color:#fff;width:100%;margin-top:8px}
.btn-start:hover{background:#2525ff}
.progress{height:3px;background:#222;border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#4444ff,#8844ff);border-radius:2px;transition:width 0.4s ease}
.result{text-align:center;padding:40px 20px}
.result-emoji{font-size:3rem;margin-bottom:16px}
.result-answer{font-size:1.5rem;font-weight:700;color:#fff;margin-bottom:8px}
.result-sub{color:#888;margin-bottom:24px}
.history{margin-top:16px;font-size:0.85rem;color:#666}
.history-item{padding:6px 0;border-bottom:1px solid #1a1a1a;display:flex;justify-content:space-between}
.history-q{color:#aaa;flex:1}.history-a{color:#888;margin-left:8px;min-width:40px;text-align:right}
.categories{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.cat-btn{padding:16px 12px;border:1px solid #282828;border-radius:12px;background:#141414;color:#ccc;cursor:pointer;text-align:center;transition:all 0.15s;font-size:0.95rem}
.cat-btn:hover{background:#1e1e1e;border-color:#444;color:#fff}
.cat-btn .cat-emoji{font-size:1.5rem;display:block;margin-bottom:6px}
.score{text-align:center;margin:20px 0;font-size:0.85rem;color:#555}
.share-btn{background:#1a1a2e;border-color:#2a2a4e;color:#aab}
.share-btn:hover{background:#252540}
.ai-banner{margin-top:32px;padding:20px;border:1px solid #1a1a2e;border-radius:14px;background:#0d0d1a;text-align:center}
.ai-banner p{font-size:0.85rem;color:#888;line-height:1.6;margin-bottom:12px}
.ai-banner .ai-tag{display:inline-block;font-size:0.7rem;background:#1a1a3a;color:#88f;padding:3px 10px;border-radius:20px;margin-bottom:10px;letter-spacing:0.05em}
.ai-banner .sponsor-links{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.ai-banner .sponsor-links a{font-size:0.8rem;color:#aab;text-decoration:none;padding:8px 14px;border:1px solid #252540;border-radius:10px;transition:all 0.15s}
.ai-banner .sponsor-links a:hover{background:#1a1a2e;border-color:#4444aa;color:#fff}
@media(max-width:360px){.container{padding:12px}h1{font-size:1.5rem}.question-text{font-size:1rem}}
</style>
</head>
<body>
<div class="container" id="app"></div>

<div class="container">
  <div class="ai-banner">
    <span class="ai-tag">MADE BY AI</span>
    <p>이 게임은 AI가 코드부터 디자인까지 자동으로 만들었습니다.<br>재밌으셨다면 AI 개발자를 후원해주세요.</p>
    <div class="sponsor-links">
      <a href="https://ko-fi.com/pureflon" target="_blank">Ko-fi</a>
      <a href="https://github.com/sponsors/pure-flon" target="_blank">GitHub Sponsors</a>
      <a href="https://paypal.me/pureflon" target="_blank">PayPal</a>
    </div>
  </div>
</div>

<script>
const CATEGORIES = {
  animal: {name:'동물',emoji:'🐾',items:['강아지','고양이','호랑이','코끼리','독수리','돌고래','펭귄','곰','여우','토끼','말','사자','상어','고래','뱀','거북이','앵무새','판다','늑대','원숭이']},
  food: {name:'음식',emoji:'🍜',items:['김치찌개','떡볶이','치킨','피자','초밥','햄버거','라면','비빔밥','삼겹살','파스타','타코','커리','마라탕','불고기','감자튀김','아이스크림','케이크','김밥','된장찌개','짜장면']},
  thing: {name:'사물',emoji:'📱',items:['스마트폰','자동차','컴퓨터','텔레비전','냉장고','우산','시계','안경','카메라','피아노','기타','축구공','책','연필','가위','거울','열쇠','지갑','이어폰','선풍기']},
  place: {name:'장소',emoji:'🗺️',items:['서울','도쿄','뉴욕','파리','런던','제주도','하와이','이집트','로마','시드니','방콕','두바이','바르셀로나','베이징','이스탄불','리우','암스테르담','싱가포르','프라하','교토']},
  person: {name:'유명인',emoji:'⭐',items:['BTS','손흥민','아이유','일론 머스크','스티브 잡스','셰익스피어','아인슈타인','피카소','마이클 조던','레오나르도 다빈치','모차르트','김연아','봉준호','뉴진스','블랙핑크','박지성','유재석','이순신','세종대왕','나폴레옹']},
  concept: {name:'추상',emoji:'💭',items:['사랑','자유','시간','꿈','행복','음악','예술','과학','민주주의','철학','우정','용기','정의','평화','모험','창의성','희망','지혜','열정','인내']}
};

const QUESTIONS = [
  {q:'살아있는 것인가요?',filter:(c)=>c==='animal'},
  {q:'먹을 수 있는 것인가요?',filter:(c)=>c==='food'},
  {q:'만질 수 있는 물리적인 것인가요?',filter:(c)=>['animal','food','thing'].includes(c)},
  {q:'특정 장소인가요?',filter:(c)=>c==='place'},
  {q:'실존 인물(또는 그룹)인가요?',filter:(c)=>c==='person'},
  {q:'눈에 보이지 않는 추상적인 것인가요?',filter:(c)=>c==='concept'},
  {q:'한국과 관련이 있나요?',filter:(c,i)=>{const kr=['김치찌개','떡볶이','치킨','라면','비빔밥','삼겹살','김밥','된장찌개','짜장면','불고기','서울','제주도','BTS','손흥민','아이유','김연아','봉준호','뉴진스','블랙핑크','박지성','유재석','이순신','세종대왕'];return kr.includes(i)}},
  {q:'집 안에서 볼 수 있나요?',filter:(c,i)=>{const home=['스마트폰','컴퓨터','텔레비전','냉장고','시계','안경','카메라','피아노','기타','책','연필','가위','거울','열쇠','지갑','이어폰','선풍기','고양이','강아지'];return home.includes(i)}},
  {q:'손에 들 수 있을 만큼 작나요?',filter:(c,i)=>{const small=['스마트폰','시계','안경','카메라','책','연필','가위','열쇠','지갑','이어폰','축구공','우산','토끼','앵무새'];return small.includes(i)}},
  {q:'보통 밖에서 즐기거나 경험하는 것인가요?',filter:(c,i)=>{const out=['축구공','자동차','우산','모험','자유'];return out.includes(i)||c==='place'}},
  {q:'100년 전에도 존재했나요?',filter:(c,i)=>{const old=['말','사자','호랑이','코끼리','곰','뱀','거북이','판다','늑대','독수리','돌고래','고래','피아노','기타','책','연필','가위','거울','열쇠','우산','김치찌개','비빔밥','된장찌개','불고기','서울','도쿄','파리','런던','로마','이스탄불','교토','프라하','셰익스피어','아인슈타인','피카소','레오나르도 다빈치','모차르트','나폴레옹','이순신','세종대왕','사랑','자유','시간','꿈','행복','음악','예술','과학','철학','우정','용기','정의','평화','지혜','인내','희망'];return old.includes(i)}},
  {q:'아시아에 있나요? (장소라면)',filter:(c,i)=>{const asia=['서울','도쿄','제주도','방콕','베이징','싱가포르','교토','두바이','이스탄불'];return c==='place'&&asia.includes(i)}},
  {q:'날 수 있나요?',filter:(c,i)=>['독수리','앵무새'].includes(i)},
  {q:'물속에서 사나요?',filter:(c,i)=>['돌고래','상어','고래','거북이'].includes(i)},
  {q:'음악과 관련이 있나요?',filter:(c,i)=>['피아노','기타','음악','BTS','뉴진스','블랙핑크','아이유','모차르트'].includes(i)},
  {q:'스포츠와 관련이 있나요?',filter:(c,i)=>['축구공','손흥민','마이클 조던','박지성','김연아'].includes(i)},
  {q:'뜨거운 음식인가요?',filter:(c,i)=>['김치찌개','라면','마라탕','된장찌개','커리','파스타','짜장면'].includes(i)},
  {q:'전자기기인가요?',filter:(c,i)=>['스마트폰','컴퓨터','텔레비전','카메라','이어폰'].includes(i)},
  {q:'유럽에 있나요?',filter:(c,i)=>['파리','런던','로마','바르셀로나','암스테르담','프라하'].includes(i)},
  {q:'21세기에 유명해진 것인가요?',filter:(c,i)=>['BTS','손흥민','아이유','뉴진스','블랙핑크','봉준호','스마트폰','이어폰','일론 머스크'].includes(i)}
];

let state={screen:'start',category:null,answer:null,candidates:[],questionIdx:0,asked:[],totalGames:+(localStorage.getItem('tq_games')||0),wins:+(localStorage.getItem('tq_wins')||0)};

function render(){
  const app=document.getElementById('app');
  if(state.screen==='start'){
    app.innerHTML=`
      <h1>AI 스무고개</h1>
      <p class="subtitle">무언가를 떠올리세요. 20번의 질문으로 맞춰볼게요.</p>
      <div class="card">
        <div class="question-text" style="text-align:center;margin-bottom:16px">카테고리를 선택하세요</div>
        <div class="categories">
          ${Object.entries(CATEGORIES).map(([k,v])=>`<div class="cat-btn" onclick="startGame('${k}')"><span class="cat-emoji">${v.emoji}</span>${v.name}</div>`).join('')}
        </div>
      </div>
      ${state.totalGames>0?`<div class="score">전적: ${state.wins}승 ${state.totalGames-state.wins}패 (${state.totalGames}게임)</div>`:''}
    `;
  } else if(state.screen==='play'){
    const progress=((state.asked.length)/20)*100;
    const currentQ=getNextQuestion();
    if(!currentQ||state.asked.length>=20){
      makeGuess();
      return;
    }
    app.innerHTML=`
      <h1>AI 스무고개</h1>
      <div class="progress"><div class="progress-bar" style="width:${progress}%"></div></div>
      <div class="card">
        <div class="question-num">질문 ${state.asked.length+1} / 20 · 후보 ${state.candidates.length}개</div>
        <div class="question-text">${currentQ.q}</div>
        <div class="btn-row">
          <button class="btn btn-yes" onclick="answer('yes')">네</button>
          <button class="btn btn-maybe" onclick="answer('maybe')">글쎄요</button>
          <button class="btn btn-no" onclick="answer('no')">아니요</button>
        </div>
      </div>
      ${state.asked.length>0?`<div class="card"><div class="question-num">지난 질문</div><div class="history">${state.asked.map(a=>`<div class="history-item"><span class="history-q">${a.q}</span><span class="history-a">${a.a==='yes'?'네':a.a==='no'?'아니요':'글쎄요'}</span></div>`).join('')}</div></div>`:''}
    `;
  } else if(state.screen==='result'){
    const won=state.resultCorrect;
    app.innerHTML=`
      <h1>AI 스무고개</h1>
      <div class="card result">
        <div class="result-emoji">${won?'🎉':'🤔'}</div>
        <div class="result-answer">${state.guess}</div>
        <div class="result-sub">${won?`${state.asked.length}번 만에 맞췄어요!`:'이번엔 못 맞췄네요...'}</div>
        <div class="btn-row">
          <button class="btn btn-yes" onclick="resultFeedback(true)">${won?'맞아요!':'그건 아니에요'}</button>
          <button class="btn btn-no" onclick="resultFeedback(false)">${won?'아닌데요':'정답 공개'}</button>
        </div>
      </div>
    `;
  } else if(state.screen==='end'){
    app.innerHTML=`
      <h1>AI 스무고개</h1>
      <div class="card result">
        <div class="result-emoji">${state.finalWin?'🏆':'😅'}</div>
        <div class="result-answer">${state.finalWin?'AI 승리!':'다음엔 맞출게요!'}</div>
        <div class="result-sub">전적: ${state.wins}승 ${state.totalGames-state.wins}패</div>
        <button class="btn btn-start" onclick="resetGame()">다시 하기</button>
        <button class="btn share-btn" onclick="shareResult()" style="margin-top:10px;width:100%;padding:14px">공유하기 📤</button>
      </div>
    `;
  }
}

function startGame(cat){
  state.category=cat;
  state.answer=null;
  state.candidates=[...CATEGORIES[cat].items];
  state.questionIdx=0;
  state.asked=[];
  state.screen='play';
  state.usedQuestions=new Set();
  render();
}

function getNextQuestion(){
  for(let i=state.questionIdx;i<QUESTIONS.length;i++){
    if(!state.usedQuestions.has(i)){
      const q=QUESTIONS[i];
      const yesCount=state.candidates.filter(item=>q.filter(state.category,item)).length;
      const ratio=yesCount/state.candidates.length;
      if(ratio>0.1&&ratio<0.9){
        state.questionIdx=i;
        return q;
      }
    }
  }
  return null;
}

function answer(a){
  const q=QUESTIONS[state.questionIdx];
  state.usedQuestions.add(state.questionIdx);
  state.asked.push({q:q.q,a});
  if(a==='yes'){
    state.candidates=state.candidates.filter(item=>q.filter(state.category,item));
  }else if(a==='no'){
    state.candidates=state.candidates.filter(item=>!q.filter(state.category,item));
  }
  if(state.candidates.length<=1||state.asked.length>=20){
    makeGuess();
    return;
  }
  state.questionIdx++;
  render();
}

function makeGuess(){
  state.guess=state.candidates.length>0?state.candidates[Math.floor(Math.random()*state.candidates.length)]:'모르겠어요...';
  state.resultCorrect=true;
  state.screen='result';
  render();
}

function resultFeedback(correct){
  state.totalGames++;
  if(correct&&state.resultCorrect){state.wins++;state.finalWin=true}
  else if(!correct&&state.resultCorrect){state.resultCorrect=false;state.finalWin=false}
  else{state.finalWin=correct}
  localStorage.setItem('tq_games',state.totalGames);
  localStorage.setItem('tq_wins',state.wins);
  state.screen='end';
  render();
}

function shareResult(){
  const text=`AI 스무고개에서 ${state.finalWin?'AI가 맞췄어요':'AI를 이겼어요'}! 🎮\n전적: ${state.wins}승 ${state.totalGames-state.wins}패\n도전해보세요 👉`;
  if(navigator.share){navigator.share({title:'AI 스무고개',text,url:location.href}).catch(()=>{})}
  else{navigator.clipboard.writeText(text+' '+location.href).then(()=>alert('링크가 복사되었어요!'))}
}

function resetGame(){state.screen='start';render()}
render();
</script>
</body>
</html>
